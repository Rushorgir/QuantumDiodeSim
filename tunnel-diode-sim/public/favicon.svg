<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
	<defs>
		<radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 32) rotate(90) scale(30)">
			<stop offset="0" stop-color="#0c1a25" />
			<stop offset="1" stop-color="#05070d" />
		</radialGradient>
		<filter id="glowCyan" x="0" y="0" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
			<feGaussianBlur stdDeviation="1.1" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>

	<rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="#1f2f40" />

	<g filter="url(#glowCyan)">
		<ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(-22 32 32)" stroke="#00d4ff" stroke-width="2.2" />
		<ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(22 32 32)" stroke="#00d4ff" stroke-width="2.2" opacity="0.95" />
		<ellipse cx="32" cy="32" rx="12" ry="22" stroke="#00d4ff" stroke-width="2.2" opacity="0.9" />
	</g>

	<circle cx="32" cy="32" r="5.5" fill="#ffb800" />

	<circle cx="46.5" cy="21" r="2.3" fill="#00d4ff" />
	<circle cx="20" cy="20.5" r="2.1" fill="#00d4ff" />
	<circle cx="24.5" cy="46" r="2.2" fill="#00d4ff" />
</svg>